<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG Analysis Dashboard</title>
    <meta name="description" content="Machine Learning powered ECG Visualization and Interpretation Dashboard">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="top-bar glass-panel">
            <div class="patient-info">
                <div class="info-item">
                    <span class="label">PID:</span>
                    <span class="value">---</span>
                </div>
                <div class="info-item">
                    <span class="label">Namn:</span>
                    <span class="value">---</span>
                </div>
                <div class="info-item">
                    <span class="label">Kön:</span>
                    <span class="value">---</span>
                </div>
                <div class="info-item">
                    <span class="label">Ålder:</span>
                    <span class="value">---</span>
                </div>
            </div>

            <div class="doctor-actions">
                <div class="doctor-info">
                    <span class="doctor-name">Anders, Andersson</span>
                </div>
                <div class="divider"></div>
                <div class="actions">
                    <button class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20h9"></path>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                        </svg>
                        Sign
                    </button>
                    <button class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 6 2 18 2 18 9"></polyline>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>
                        Print
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Left Side: ECG Visualizations -->
            <div class="left-panel">
                <div class="ecg-pane glass-panel" id="ecg-top">
                    <div class="canvas-container">
                        <!-- Canvas will be injected here by JS -->
                    </div>
                </div>

                <div class="resizer" id="resizer"></div>

                <div class="ecg-pane glass-panel" id="ecg-bottom">
                    <div class="canvas-container">
                        <!-- Canvas will be injected here by JS -->
                    </div>
                </div>
            </div>

            <!-- Right Side: ML Interpretation & Tools -->
            <aside class="right-panel glass-panel" id="right-panel">
            </aside>
        </main>
    </div>

    <!-- Load TensorFlow.js or ONNX runtime later based on your model -->
    <script src="script.js" type="module"></script>
</body>

</html>
